# Railway deployment config for the LogSentinel API service.
# Dashboard is deployed separately (static site from `dashboard/dist/`).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# No startCommand — we rely on the Dockerfile's CMD (entrypoint.sh), which
# runs alembic with explicit exit-code capture + startup banner before
# exec'ing uvicorn. Overriding it here would bypass all that diagnostic
# logging.
healthcheckPath = "/health"
# Fresh Railway Postgres + first-time migration (full schema + indexes) can
# eat 20s before uvicorn even starts. 300s is Railway's default and gives
# plenty of headroom — a stuck container still bails via restartPolicy.
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
